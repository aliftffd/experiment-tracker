# Experiment Tracker Configuration

[general]
# Directories to watch for experiment logs
watch_dirs = ["./experiments"]

# UI refresh rate (milliseconds)
refresh_rate_ms = 250

# Database location (auto-detected if not set)
# Linux:   ~/.local/share/experiment-tracker/tracker.db
# Windows: %LOCALAPPDATA%\experiment-tracker\tracker.db
# db_path = "custom/path/tracker.db"

[ui]
theme = "dark"
show_sparklines = true
show_gpu_bar = true
max_chart_points = 500

[parser]
# Log format: "jsonl", "csv", or "auto" (detect by extension/content)
default_format = "auto"

# JSON field names for epoch and step
epoch_field = "epoch"
step_field = "step"
loss_field = "loss"
accuracy_field = "accuracy"

[gpu]
# GPU polling interval in seconds
poll_interval_secs = 2

# Temperature thresholds (Celsius)
temp_warning = 80
temp_critical = 90

# VRAM usage thresholds (percentage)
vram_warning = 80
vram_critical = 95

[docker]
# Default Docker image for training
default_image = "thesis-training:latest"

# Enable GPU passthrough
gpu = true

# Container working directory (where metrics.jsonl is written)
container_workdir = "/workspace/output"
